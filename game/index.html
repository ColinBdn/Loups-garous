<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="./socket.io.js"></script>
</head>

<body style="margin: 0; padding: 0;">

    <section id="connectForm">
        <div>
        <input type="text" id="playerName" placeholder="entrez votre nom/pseudo" autocomplete="off">
        <button id="connectButton" type="button" onclick="connect()">submit</button>
        </div>
        <p>number of connected player: <span id="nbPlayer">0</span></p>
    </section>

    
    <section id="mainSection">

        <div id="infoSection">
            <div id="infoSectionCenter">
                <h1>Ton rôle:</h1>
                <div>
                    <div style="display: flex; flex-direction: column; text-align: center;">
                        <img id="ownRole">
                        <p id="ownRoleText"></p>
                    </div>
                </div>
                <div id="privateMessage">
                    <p>
                        
                    </p>
                </div>
            </div>
        </div>
        
        <div id="gameSection">
            <div id="gameMessagesDiv">
                <p id="gameMessages"></p>
            </div>
        </div>


        <div id="chatSection">
            <div id="chat">
                <div id="messageListBorder">
                    <div id="messagesList">
                    </div>
                </div>
                <div id="chatInput">
                    <input id="message" type="text" placeholder="Ecrivez votre message..." />
                    <button id="send">Envoyer</button>
                </div>
            </div>
        </div>

    </section>


    <script src="script.js"></script>
</body>
</html>
